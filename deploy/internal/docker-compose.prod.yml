name: zpe-api-platform-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [app_net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks: [app_net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  backend:
    image: ${BACKEND_IMAGE}:${DEPLOY_TAG}
    restart: unless-stopped
    env_file: ../../.env.prod
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [app_net]
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  worker:
    image: ${BACKEND_IMAGE}:${DEPLOY_TAG}
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file: ../../.env.prod
    depends_on:
      backend: { condition: service_started }
      redis: { condition: service_healthy }
    networks: [app_net]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  frontend:
    image: ${FRONTEND_IMAGE}:${DEPLOY_TAG}
    restart: unless-stopped
    networks: [app_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      backend: { condition: service_healthy }
      frontend: { condition: service_healthy }
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/site.conf:/etc/nginx/conf.d/site.conf:ro
      - ./nginx/conf.d/allowlist.conf:/etc/nginx/conf.d/allowlist.conf:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
      - ../../secrets/htpasswd:/etc/nginx/.htpasswd:ro
    networks: [app_net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    profiles: ["certbot"]
    volumes:
      - ./nginx/certbot/www:/var/www/certbot
      - ./nginx/certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h; done"
    networks: [app_net]

  node-exporter:
    image: prom/node-exporter:latest
    restart: unless-stopped
    profiles: ["monitoring"]
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    ports:
      - "127.0.0.1:9100:9100"

networks:
  app_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads:
  nginx_logs:
