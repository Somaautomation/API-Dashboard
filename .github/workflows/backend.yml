name: backend

on:
  push: { paths: ["backend/**", ".github/workflows/backend.yml"] }
  pull_request: { paths: ["backend/**"] }

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: backend }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: "pip", cache-dependency-path: backend/requirements.txt }
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiosqlite ruff
      - name: Lint
        run: ruff check app
      - name: Test
        env:
          APP_SECRET_KEY: ci-secret-key-1234567890abcdef
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          DATABASE_SYNC_URL: sqlite:///./test.db
        run: pytest -q

  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/backend.Dockerfile
          push: false
          tags: zpe/api-platform-backend:ci
