name: internal-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: Deployment mode
        required: true
        default: deploy
        type: choice
        options: [deploy, rollback]
      rollback_tag:
        description: Image tag (sha) to rollback to. Required if mode=rollback.
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./docker/backend.prod.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/apidashboard-backend:${{ github.sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./docker/frontend.prod.Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=https://${{ secrets.INTERNAL_DOMAIN }}/api/v1
          tags: ghcr.io/${{ github.repository_owner }}/apidashboard-frontend:${{ github.sha }}

  deploy:
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'deploy')
    needs: [build_and_push]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch --all --tags
            git checkout ${{ github.sha }}

            if grep -q '^DEPLOY_TAG=' .env.prod; then
              sed -i 's/^DEPLOY_TAG=.*/DEPLOY_TAG=${{ github.sha }}/' .env.prod
            else
              echo 'DEPLOY_TAG=${{ github.sha }}' >> .env.prod
            fi

            if grep -q '^BACKEND_IMAGE=' .env.prod; then
              sed -i 's|^BACKEND_IMAGE=.*|BACKEND_IMAGE=ghcr.io/${{ github.repository_owner }}/apidashboard-backend|' .env.prod
            else
              echo 'BACKEND_IMAGE=ghcr.io/${{ github.repository_owner }}/apidashboard-backend' >> .env.prod
            fi

            if grep -q '^FRONTEND_IMAGE=' .env.prod; then
              sed -i 's|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/apidashboard-frontend|' .env.prod
            else
              echo 'FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/apidashboard-frontend' >> .env.prod
            fi

            bash ./deploy/internal/scripts/deploy.sh
            bash ./deploy/internal/scripts/post-deploy-checks.sh

  rollback:
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'rollback'
    runs-on: ubuntu-latest
    steps:
      - name: Validate input
        run: |
          if [ -z "${{ inputs.rollback_tag }}" ]; then
            echo "rollback_tag is required when mode=rollback"
            exit 1
          fi

      - name: Rollback over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.DEPLOY_PATH }}
            bash ./deploy/internal/scripts/rollback.sh ${{ inputs.rollback_tag }}
            bash ./deploy/internal/scripts/post-deploy-checks.sh
